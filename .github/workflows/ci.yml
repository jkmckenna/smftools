name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==0.15.0"
      - name: Check formatting with ruff
        run: ruff format --check .

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==0.15.0"
      - name: Lint with ruff
        run: ruff check --output-format=github .

  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[all]"
          python -m pip install --group test
      - name: Run Python 3.11 smoke compatibility tests
        if: matrix.python-version == '3.11'
        run: pytest -m smoke -q
      - name: Run Python 3.12 smoke and unit tests
        if: matrix.python-version == '3.12'
        run: pytest -m "smoke or unit" -vv --durations=30

  storage-minimums:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimum supported storage stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "anndata==0.12.0" \
            "biopython>=1.79" \
            "zarr==3.1.0" \
            "pyarrow==15.0.0" \
            "pandas==2.1.0" \
            "psutil>=5.9.0"
          python -m pip install --group test
          python -m pip install --no-deps .
      - name: Test minimum supported storage stack
        run: |
          pytest -q \
            tests/unit/informatics/test_incremental_zarr.py \
            tests/unit/informatics/test_partition_read.py \
            tests/unit/informatics/test_raw_store.py \
            tests/unit/test_partitioned_pipeline_fixture.py

  docs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --group docs
          python -m pip install --no-deps .
      - name: Build docs
        run: sphinx-build -W -b html docs/source docs/_build/html

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build package
        run: python -m build
      - name: Check dist metadata
        run: twine check dist/*
