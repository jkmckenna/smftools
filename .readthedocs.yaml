version: 2
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_install:
      - python -m pip install --upgrade pip
      - python -m pip install --group docs
      - python -m pip install --no-deps .
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true
submodules:
  include: all
  recursive: true
